# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air" # air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# Site Settings
locale: "ko-KR"
title: "Today's English Word Puzzles"
subtitle: "매일 영어 퍼즐 정답 & 학습 팁"
name: "English Puzzle Guide"
description: "매일 업데이트되는 영어 단어 퍼즐 정답과 영어 학습 팁"
url: "https://kyjun.github.io"
baseurl: "/english-word-puzzles"
repository: "KYJun/english-word-puzzles"
logo: # 로고 이미지 경로
masthead_title: "🧩 Today's English Word Puzzles"
# og_image: /assets/images/og-default.png  # 1200x630px PNG 이미지 준비 후 활성화

# Search
search: true
search_full_content: true
search_provider: lunr

# Author
author:
  name: "English Puzzle Guide"
  bio: "매일 영어 퍼즐 정답과 학습 팁을 제공합니다"
  location: "Korea"
  links: []

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-seo-tag

# Pagination
paginate: 10
paginate_path: /page:num/

# Reading
words_per_minute: 200

# Collections
collections:
  games:
    output: true

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
      toc: true
      toc_label: "목차"
      toc_sticky: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Category & Tag Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Outputting
timezone: Asia/Seoul

# Include
include:
  - _pages

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - scripts/
  - vendor/

# Comments (Disqus)
comments:
  provider: "disqus"
  disqus:
    shortname: "english-word-puzzles"

# Google Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-1CLY9EPCKZ"
